name: CI

# Two jobs run on every PR and on pushes to main:
#   - guards: the frontend bridge/render checks (documented in scripts/ and the
#     module-split notes). Until they were gated, the #273 (open-ticket crash)
#     and #275–#279 window-reach bugs reached main. The frontend is a static SPA
#     bundled with `bun build` — no frontend package.json; state.js/data.js are
#     ES modules bundled via the entry's import graph, so the smokes prepend the
#     DOM/runtime shim ahead of the bundle (scripts/bridge-smoke-shim-prefix.js).
#   - api: the backend (api/) typecheck + tests, which build from api/package.json.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guards:
    name: build + collision + smokes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Bundle build (app.js)
        run: bun build web/js/app.js > scripts/app.bundled.js

      - name: Bridge collision check
        run: bun scripts/bridge-collision-check.mjs

      - name: Route smoke — every route renders
        run: |
          bun build scripts/route-smoke-entry.js > scripts/route-entry.bundled.js
          cat scripts/bridge-smoke-shim-prefix.js \
              scripts/route-entry.bundled.js \
              scripts/bridge-smoke-shim-suffix.js > scripts/full-smoke.js
          bun scripts/full-smoke.js

      - name: Detail-render smoke — openTicket every demo ticket
        run: |
          bun build scripts/detail-smoke-entry.js > scripts/detail-entry.bundled.js
          cat scripts/bridge-smoke-shim-prefix.js \
              scripts/detail-entry.bundled.js \
              scripts/detail-smoke-suffix.js > scripts/detail-smoke.js
          bun scripts/detail-smoke.js

  # Backend (api/) typecheck + tests. Previously these existed but were never
  # gated — a regression in auth/CORS/cron/email could merge freely. The tests
  # are hermetic (lazy DB connection + a placeholder DATABASE_URL set in
  # index.test.ts), so no database or secrets are required in CI.
  api:
    name: api typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test
